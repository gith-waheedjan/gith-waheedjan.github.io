<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            padding:60px;
        }

        h1{
            color:#0077cc;
        }

        .card{
            background:white;
            max-width:700px;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
        }

        button{
            background:#0077cc;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:8px;
            cursor:pointer;
            font-size:18px;
        }

        button:hover{
            background:#005fa3;
        }
    </style>
</head>

<body>

<div class="card">

<h1>Welcome to My Website</h1>

<p>
This website is hosted for free using GitHub Pages.
</p>

<button onclick="hello()">
Click Me
</button>

<p id="message"></p>

</div>

<script>

function hello(){
    document.getElementById("message").innerHTML =
    "🎉 Congratulations! JavaScript is working.";
}

</script>

</body>
</html>
